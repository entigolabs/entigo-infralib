global:
  # Install Prometheus Operator CRDs (ServiceMonitor/PodMonitor)
  # Required if you enable cluster-metrics.serviceMonitors/podMonitors
  installPrometheusOperatorCRDs: false

prometheus-operator-crds:
  crds:
    annotations:
      argocd.argoproj.io/sync-options: ServerSideApply=true

logs:
  enabled: true
  crds:
    create: false
  lokiEndpoint: "http://loki-gateway.loki/loki/api/v1/push"
  lokiTenantID: ""
  extraProcessStages: ""
  # extraProcessStages: |
  #   stage.multiline {
  #     firstline     = "^[^\\s].*\\d{2}:\\d{2}:\\d{2},\\d{3}"
  #     max_wait_time = "5s"
  #     max_lines     = 5000
  #   }

  alloy:
    configMap:
      create: true
      content: |
        logging {
          level  = "warn"
          format = "json"
        }

        discovery.kubernetes "kubernetes_pods" {
          role = "pod"
          selectors {
            role  = "pod"
            field = "spec.nodeName=" + sys.env("HOSTNAME")
          }
        }

        discovery.relabel "kubernetes_pods" {
          targets = discovery.kubernetes.kubernetes_pods.targets

          rule {
            source_labels = ["__meta_kubernetes_pod_controller_name"]
            regex         = "([0-9a-z-.]+?)(-[0-9a-f]{8,10})?"
            target_label  = "__tmp_controller_name"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name", "__meta_kubernetes_pod_label_app", "__tmp_controller_name", "__meta_kubernetes_pod_name"]
            regex         = "^;*([^;]+)(;.*)?$"
            target_label  = "app"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_instance", "__meta_kubernetes_pod_label_instance"]
            regex         = "^;*([^;]+)(;.*)?$"
            target_label  = "instance"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_component", "__meta_kubernetes_pod_label_component"]
            regex         = "^;*([^;]+)(;.*)?$"
            target_label  = "component"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_node_name"]
            target_label  = "node_name"
          }

          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }

          rule {
            source_labels = ["namespace", "app"]
            separator     = "/"
            target_label  = "job"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
            separator     = "/"
            target_label  = "__path__"
            replacement   = "/var/log/pods/*$1/*.log"
          }

          rule {
            source_labels = ["__meta_kubernetes_pod_annotationpresent_kubernetes_io_config_hash", "__meta_kubernetes_pod_annotation_kubernetes_io_config_hash", "__meta_kubernetes_pod_container_name"]
            regex         = "true/(.*)"
            replacement   = "/var/log/pods/*$1/*.log"
            separator     = "/"
            target_label  = "__path__"
          }
        }

        local.file_match "kubernetes_pods" {
          path_targets = discovery.relabel.kubernetes_pods.output
        }

        local.file_match "all_container_logs" {
          path_targets = [{
            __path__ = "/var/log/containers/*.log",
          }]
        }

        loki.source.file "kubernetes_pods" {
          targets       = array.concat(local.file_match.kubernetes_pods.targets, local.file_match.all_container_logs.targets)
          forward_to    = [loki.process.kubernetes_pods.receiver]
          tail_from_end = true
        }

        loki.process "kubernetes_pods" {
          forward_to = [loki.write.default.receiver]
          stage.cri { }
          {{- if .Values.extraProcessStages }}
          {{- .Values.extraProcessStages | nindent 2 }}
          {{- end }}
        }

        loki.write "default" {
          endpoint {
            url = {{ .Values.lokiEndpoint | quote }}
            {{- if .Values.lokiTenantID }}
            tenant_id = {{ .Values.lokiTenantID | quote }}
            {{- end }}
          }
        }

    mounts:
      varlog: true
    resources:
      requests:
        cpu: "10m"
        memory: "45Mi"
        ephemeral-storage: "100Mi"
      limits:
        cpu: "500m"
        memory: "500Mi"
        ephemeral-storage: "50Gi"
    livenessProbe:
      httpGet:
        path: /-/healthy
        port: 12345
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    enableHttpServerPort: false
    enableReporting: false

  service:
    enabled: false

  serviceAccount:
    create: true

  configReloader:
    enabled: false

  networkPolicy:
    enabled: true
    policyTypes:
      - Ingress
      - Egress
    ingress: []
    egress:
      - ports:
          - port: 53
            protocol: UDP
          - port: 53
            protocol: TCP
        to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: kube-system
      - ports:
          - port: 80
            protocol: TCP
          - port: 8080
            protocol: TCP
        to:
          - namespaceSelector: {}
            podSelector:
              matchLabels:
                app.kubernetes.io/name: loki
                app.kubernetes.io/component: gateway

  controller:
    type: "daemonset"
    replicas: 1
    priorityClassName: "alloy"
    tolerations:
      - effect: NoSchedule
        operator: Exists

# ---------------------------------------------------------------------------
# node-metrics: per-node DaemonSet and scrapes the local node's kubelet + cAdvisor
# ---------------------------------------------------------------------------
node-metrics:
  enabled: true
  crds:
    create: false
  mimirEndpoint: "http://mimir-gateway.mimir/api/v1/push"
  mimirTenantID: ""

  # Labels added to every series, e.g. {cluster: prod}
  externalLabels: {}
  scrapeInterval: "60s"
  selfMonitor: true

  extraConfig: ""

  alloy:
    configMap:
      create: true
      content: |
        logging {
          level  = "warn"
          format = "json"
        }

        prometheus.remote_write "default" {
          {{- if .Values.externalLabels }}
          external_labels = {
            {{- range $k, $v := .Values.externalLabels }}
            {{ $k }} = {{ $v | quote }},
            {{- end }}
          }
          {{- end }}
          endpoint {
            url = {{ .Values.mimirEndpoint | quote }}
            {{- if .Values.mimirTenantID }}
            headers = {
              "X-Scope-OrgID" = {{ .Values.mimirTenantID | quote }},
            }
            {{- end }}
          }
        }

        prometheus.exporter.unix "node" {
          rootfs_path = "/host/root"
          procfs_path = "/host/proc"
          sysfs_path  = "/host/sys"

          filesystem {
            mount_points_exclude = "^/(dev|proc|sys|run/credentials/.+|var/lib/docker/.+|var/lib/kubelet/.+)($|/)"
            fs_types_exclude     = "^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$"
          }
          netclass {
            ignored_devices = "^(veth.*|cali.*|[a-f0-9]{15})$"
          }
        }

        discovery.relabel "node_exporter" {
          targets = prometheus.exporter.unix.node.targets
          rule {
            target_label = "job"
            replacement  = "node-exporter"
          }
          rule {
            target_label = "instance"
            replacement  = sys.env("HOSTNAME")
          }
          rule {
            target_label = "node"
            replacement  = sys.env("HOSTNAME")
          }
        }

        prometheus.scrape "node_exporter" {
          targets         = discovery.relabel.node_exporter.output
          forward_to      = [prometheus.remote_write.default.receiver]
          scrape_interval = {{ .Values.scrapeInterval | quote }}
        }

        discovery.kubernetes "local_node" {
          role = "node"
          selectors {
            role  = "node"
            field = "metadata.name=" + sys.env("HOSTNAME")
          }
        }

        discovery.relabel "kubelet" {
          targets = discovery.kubernetes.local_node.targets
          rule {
            source_labels = ["__meta_kubernetes_node_name"]
            target_label  = "node"
          }
          rule {
            target_label = "instance"
            replacement  = sys.env("HOSTNAME")
          }
        }

        prometheus.scrape "kubelet" {
          targets           = discovery.relabel.kubelet.output
          forward_to        = [prometheus.remote_write.default.receiver]
          job_name          = "kubelet"
          scheme            = "https"
          bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
          scrape_interval   = {{ .Values.scrapeInterval | quote }}
          tls_config {
            insecure_skip_verify = true
          }
        }

        prometheus.scrape "cadvisor" {
          targets           = discovery.relabel.kubelet.output
          forward_to        = [prometheus.remote_write.default.receiver]
          job_name          = "cadvisor"
          scheme            = "https"
          metrics_path      = "/metrics/cadvisor"
          bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
          scrape_interval   = {{ .Values.scrapeInterval | quote }}
          tls_config {
            insecure_skip_verify = true
          }
        }

        {{- if .Values.selfMonitor }}
        prometheus.exporter.self "alloy" { }

        discovery.relabel "alloy_self" {
          targets = prometheus.exporter.self.alloy.targets
          rule {
            target_label = "instance"
            replacement  = sys.env("HOSTNAME")
          }
          rule {
            target_label = "node"
            replacement  = sys.env("HOSTNAME")
          }
        }

        prometheus.scrape "alloy_self" {
          targets         = discovery.relabel.alloy_self.output
          forward_to      = [prometheus.remote_write.default.receiver]
          job_name        = "alloy-node-metrics"
          scrape_interval = {{ .Values.scrapeInterval | quote }}
        }
        {{- end }}
        {{- if .Values.extraConfig }}
        {{ .Values.extraConfig | nindent 8 }}
        {{- end }}

    mounts:
      extra:
        - name: rootfs
          mountPath: /host/root
          readOnly: true
          mountPropagation: HostToContainer
        - name: procfs
          mountPath: /host/proc
          readOnly: true
        - name: sysfs
          mountPath: /host/sys
          readOnly: true
    resources:
      requests:
        cpu: "10m"
        memory: "60Mi"
        ephemeral-storage: "100Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
        ephemeral-storage: "1Gi"
    livenessProbe:
      httpGet:
        path: /-/healthy
        port: 12345
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    enableHttpServerPort: false
    enableReporting: false

  service:
    enabled: false

  serviceAccount:
    create: true

  configReloader:
    enabled: false

  networkPolicy:
    enabled: true
    policyTypes:
      - Ingress
      - Egress
    ingress: []
    egress:
      - ports:
          - port: 53
            protocol: UDP
          - port: 53
            protocol: TCP
        to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: kube-system
      # Mimir gateway
      - ports:
          - port: 80
            protocol: TCP
          - port: 8080
            protocol: TCP
        to:
          - namespaceSelector: {}
            podSelector:
              matchLabels:
                app.kubernetes.io/name: mimir
                app.kubernetes.io/component: gateway
      # Kubelet / cAdvisor on the local node
      - ports:
          - port: 10250
            protocol: TCP

  controller:
    type: "daemonset"
    replicas: 1
    priorityClassName: "alloy"
    volumes:
      extra:
        - name: rootfs
          hostPath:
            path: /
        - name: procfs
          hostPath:
            path: /proc
        - name: sysfs
          hostPath:
            path: /sys
    tolerations:
      - effect: NoSchedule
        operator: Exists

# ---------------------------------------------------------------------------
# cluster-metrics: single-replica Deployment for cluster-wide scrape targets (kube-state-metrics, annotation-based pod discovery etc)
# ---------------------------------------------------------------------------
cluster-metrics:
  enabled: true
  crds:
    create: false
  mimirEndpoint: "http://mimir-gateway.mimir/api/v1/push"
  mimirTenantID: ""

  # Labels added to every series, e.g. {cluster: prod}
  externalLabels: {}
  scrapeInterval: "60s"
  selfMonitor: true

  # Scrape Prometheus Operator ServiceMonitor / PodMonitor CRDs. Requires the CRDs to exist (set global.installPrometheusOperatorCRDs to true)
  serviceMonitors: false
  podMonitors: false
  
  extraConfig: ""

  alloy:
    configMap:
      create: true
      content: |
        logging {
          level  = "warn"
          format = "json"
        }

        prometheus.remote_write "default" {
          {{- if .Values.externalLabels }}
          external_labels = {
            {{- range $k, $v := .Values.externalLabels }}
            {{ $k }} = {{ $v | quote }},
            {{- end }}
          }
          {{- end }}
          endpoint {
            url = {{ .Values.mimirEndpoint | quote }}
            {{- if .Values.mimirTenantID }}
            headers = {
              "X-Scope-OrgID" = {{ .Values.mimirTenantID | quote }},
            }
            {{- end }}
          }
        }

        discovery.kubernetes "pods" {
          role = "pod"
        }

        // kube-state-metrics is kept as a standalone module/deployment
        discovery.relabel "kube_state_metrics" {
          targets = discovery.kubernetes.pods.targets
          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            regex         = "kube-state-metrics"
            action        = "keep"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_container_port_number"]
            regex         = "8080"
            action        = "keep"
          }
          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }
          rule {
            target_label = "job"
            replacement  = "kube-state-metrics"
          }
        }

        prometheus.scrape "kube_state_metrics" {
          targets         = discovery.relabel.kube_state_metrics.output
          forward_to      = [prometheus.remote_write.default.receiver]
          scrape_interval = {{ .Values.scrapeInterval | quote }}
        }

        // Annotation-based discovery: scrape pods with prometheus.io/scrape=true.
        discovery.relabel "annotated_pods" {
          targets = discovery.kubernetes.pods.targets
          rule {
            source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
            regex         = "true"
            action        = "keep"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_phase"]
            regex         = "Running"
            action        = "keep"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scheme"]
            regex         = "(https?)"
            target_label  = "__scheme__"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
            regex         = "(.+)"
            target_label  = "__metrics_path__"
          }
          rule {
            source_labels = ["__address__", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
            regex         = "([^:]+)(?::[0-9]+)?;([0-9]+)"
            replacement   = "$1:$2"
            target_label  = "__address__"
          }
          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_node_name"]
            target_label  = "node"
          }
        }

        prometheus.scrape "annotated_pods" {
          targets         = discovery.relabel.annotated_pods.output
          forward_to      = [prometheus.remote_write.default.receiver]
          scrape_interval = {{ .Values.scrapeInterval | quote }}
        }

        // Endpoints discovery, reused by service-endpoints and apiserver scraping.
        discovery.kubernetes "endpoints" {
          role = "endpoints"
        }

        // kubernetes-service-endpoints: scrape Services annotated prometheus.io/scrape=true.
        discovery.relabel "service_endpoints" {
          targets = discovery.kubernetes.endpoints.targets
          rule {
            source_labels = ["__meta_kubernetes_service_annotation_prometheus_io_scrape"]
            regex         = "true"
            action        = "keep"
          }
          rule {
            source_labels = ["__meta_kubernetes_service_name"]
            regex         = "kube-state-metrics"
            action        = "drop"
          }
          rule {
            source_labels = ["__meta_kubernetes_service_annotation_prometheus_io_scheme"]
            regex         = "(https?)"
            target_label  = "__scheme__"
          }
          rule {
            source_labels = ["__meta_kubernetes_service_annotation_prometheus_io_path"]
            regex         = "(.+)"
            target_label  = "__metrics_path__"
          }
          rule {
            source_labels = ["__address__", "__meta_kubernetes_service_annotation_prometheus_io_port"]
            regex         = "([^:]+)(?::[0-9]+)?;([0-9]+)"
            replacement   = "$1:$2"
            target_label  = "__address__"
          }
          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }
          rule {
            source_labels = ["__meta_kubernetes_service_name"]
            target_label  = "service"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_node_name"]
            target_label  = "node"
          }
          rule {
            source_labels = ["__meta_kubernetes_service_name"]
            target_label  = "job"
          }
        }

        prometheus.scrape "service_endpoints" {
          targets         = discovery.relabel.service_endpoints.output
          forward_to      = [prometheus.remote_write.default.receiver]
          scrape_interval = {{ .Values.scrapeInterval | quote }}
        }

        // kubernetes-apiservers: scrape the API server's own /metrics
        discovery.relabel "apiserver" {
          targets = discovery.kubernetes.endpoints.targets
          rule {
            source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_service_name", "__meta_kubernetes_endpoint_port_name"]
            regex         = "default;kubernetes;https"
            action        = "keep"
          }
        }

        prometheus.scrape "apiserver" {
          targets           = discovery.relabel.apiserver.output
          forward_to        = [prometheus.remote_write.default.receiver]
          job_name          = "kubernetes-apiservers"
          scheme            = "https"
          bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
          scrape_interval   = {{ .Values.scrapeInterval | quote }}
          tls_config {
            ca_file     = "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
            server_name = "kubernetes"
          }
        }

        {{- if .Values.serviceMonitors }}
        // Scrape all ServiceMonitor CRDs cluster-wide (requires the operator CRDs)
        prometheus.operator.servicemonitors "servicemonitors" {
          forward_to = [prometheus.remote_write.default.receiver]
        }
        {{- end }}
        {{- if .Values.podMonitors }}
        // Scrape all PodMonitor CRDs cluster-wide (requires the operator CRDs)
        prometheus.operator.podmonitors "podmonitors" {
          forward_to = [prometheus.remote_write.default.receiver]
        }
        {{- end }}
        {{- if .Values.selfMonitor }}
        prometheus.exporter.self "alloy" { }

        prometheus.scrape "alloy_self" {
          targets         = prometheus.exporter.self.alloy.targets
          forward_to      = [prometheus.remote_write.default.receiver]
          job_name        = "alloy-cluster-metrics"
          scrape_interval = {{ .Values.scrapeInterval | quote }}
        }
        {{- end }}
        {{- if .Values.extraConfig }}
        {{ .Values.extraConfig | nindent 8 }}
        {{- end }}

    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
        ephemeral-storage: "100Mi"
      limits:
        cpu: "2"
        memory: "2Gi"
        ephemeral-storage: "10Gi"
    livenessProbe:
      httpGet:
        path: /-/healthy
        port: 12345
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    enableHttpServerPort: false
    enableReporting: false

  service:
    enabled: false

  serviceAccount:
    create: true

  configReloader:
    enabled: false

  networkPolicy:
    enabled: true
    policyTypes:
      - Ingress
      - Egress
    ingress: []
    egress:
      - ports:
          - port: 53
            protocol: UDP
          - port: 53
            protocol: TCP
        to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: kube-system
      # Mimir gateway
      - ports:
          - port: 80
            protocol: TCP
          - port: 8080
            protocol: TCP
        to:
          - namespaceSelector: {}
            podSelector:
              matchLabels:
                app.kubernetes.io/name: mimir
                app.kubernetes.io/component: gateway
      - to:
          - namespaceSelector: {}

  controller:
    type: "deployment"
    replicas: 1
    priorityClassName: "alloy"
    tolerations:
      - key: "mon"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
      - key: "tools"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 90
            preference:
              matchExpressions:
                - key: mon
                  operator: In
                  values:
                    - "true"
          - weight: 10
            preference:
              matchExpressions:
                - key: tools
                  operator: In
                  values:
                    - "true"
