apiVersion: v2
name: alloy
description: An Alloy chart for Kubernetes
type: application
version: 0.1.0
appVersion: "1.0"

dependencies:
  - name: alloy
    alias: logs
    version: 1.8.2
    repository: https://grafana.github.io/helm-charts
  - name: alloy
    alias: node-metrics
    version: 1.8.2
    repository: https://grafana.github.io/helm-charts
    condition: node-metrics.enabled
  - name: alloy
    alias: cluster-metrics
    version: 1.8.2
    repository: https://grafana.github.io/helm-charts
    condition: cluster-metrics.enabled
