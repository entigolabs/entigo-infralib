global:
  cloudProvider: ""
  providerConfigRefName: ""
  prefix: ""

kube-state-metrics:
  fullnameOverride: kube-state-metrics

  # Keep these node/namespace labels available on kube_*_labels series
  # (mirrors what the prometheus module exposed).
  metricLabelsAllowlist:
    - nodes=[eks.amazonaws.com/nodegroup,kubernetes.io/arch,node.kubernetes.io/instance-type,tenancy.entigo.com/zone,tenancy.entigo.com/zone-pool,eks.amazonaws.com/capacityType,topology.kubernetes.io/zone]
    - namespaces=[tenancy.entigo.com/zone]

  networkPolicy:
    enabled: true
    # Ingress open on the metrics ports so any scraper (e.g. alloy cluster-metrics) can reach it.
    ingress:
      - ports:
          - port: http
          - port: metrics
    # Egress to DNS only in the base; cloud overlays add the Kubernetes API.
    egress:
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: kube-system
            podSelector:
              matchLabels:
                k8s-app: kube-dns
        ports:
          - protocol: UDP
            port: 53
          - protocol: TCP
            port: 53

  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 90
          preference:
            matchExpressions:
              - key: mon
                operator: In
                values:
                  - "true"
        - weight: 10
          preference:
            matchExpressions:
              - key: tools
                operator: In
                values:
                  - "true"
  tolerations:
    - key: "mon"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"
    - key: "tools"
      operator: "Equal"
      value: "true"
      effect: "NoSchedule"

  resources:
    limits:
      cpu: 1
      memory: 256Mi
      ephemeral-storage: 1Gi
    requests:
      cpu: 10m
      memory: 32Mi
      ephemeral-storage: 10Mi
