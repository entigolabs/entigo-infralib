global:
  cloudProvider: aws
  providerConfigRefName: crossplane-aws

kube-state-metrics:
  networkPolicy:
    egress:
      - to:
          - namespaceSelector:
              matchLabels:
                kubernetes.io/metadata.name: kube-system
            podSelector:
              matchLabels:
                k8s-app: kube-dns
        ports:
          - protocol: UDP
            port: 53
          - protocol: TCP
            port: 53
      # Kubernetes API
      - to:
          - ipBlock:
              cidr: 172.20.0.1/32
        ports:
          - port: 443
            protocol: TCP
