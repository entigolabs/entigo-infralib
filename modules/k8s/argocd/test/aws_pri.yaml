argocd:
  repoServer:
    autoscaling:
      maxReplicas: 1
  server:
    ingress:
      annotations:
        alb.ingress.kubernetes.io/group.name: external
        alb.ingress.kubernetes.io/scheme: internet-facing
  global:
    domain: |
      {{ .module.name }}.{{ .toutput.route53.int_domain }}
  configs:
    rbac:
      policy.csv: |
        g, web-admin-258953744228679165, role:admin
        g, web-admin-337507228502216899, role:admin
        g, web-admin-343159627493470238, role:admin
        p, infralib, applications, get, */*, allow
        p, infralib, applications, sync, */*, allow
        p, infralib, projects, get, *, allow
      policy.default: role:readonly
    cm:
      dex.config: |
        connectors:
          - type: oidc
            id: zitadel
            name: Zitadel
            config:
              issuer: https://entigo-dev-if3upz.zitadel.cloud
              clientID: "343161107176783665"
              clientSecret: "{{ .output-custom./argocd-pri/clientSecret }}"
              scopes:
                - openid
                - profile
                - email
                - groups
