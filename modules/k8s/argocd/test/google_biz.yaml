global:
  google:
    gateway:
      name: "google-gateway-external"
argocd:
  repoServer:
    autoscaling:
      maxReplicas: 1
  global:
    domain: |
      {{ .module.name }}.{{ .toutput.dns.pub_domain }}
  configs:
    rbac:
      policy.csv: |
        g, web-admin-258953744228679165, role:admin
        g, web-admin-337507228502216899, role:admin
        g, web-admin-343159627493470238, role:admin
        p, infralib, applications, get, */*, allow
        p, infralib, applications, sync, */*, allow
        p, infralib, projects, get, *, allow
      policy.default: role:readonly
    cm:
      dex.config: |
        connectors:
          - type: oidc
            id: zitadel
            name: Zitadel
            config:
              issuer: https://entigo-dev-if3upz.zitadel.cloud
              clientID: "343161091574001694"
              clientSecret: "{{ .output-custom./argocd-biz/clientSecret }}"
              insecureEnableGroups: true
              getUserInfo: true
              scopes:
                - openid
                - profile
                - email
                - groups

argocd-apps:
    applications:
        extra:
            destination:
                namespace: "extra"
                server: https://kubernetes.default.svc
            namespace: "{{ .module.name }}"
            project: default
            source:
                helm:
                    valueFiles:
                        - values.yaml
                    values: |
                      image:
                        registry: '{{ .toptout.gar-proxy.hub_registry | "docker.io" }}/nginxinc/nginx-unprivileged'
                path: modules/k8s/hello-world
                repoURL: https://github.com/entigolabs/entigo-infralib-release.git
                targetRevision: main
            syncPolicy:
                automated: {}
                syncOptions:
                    - CreateNamespace=true
                managedNamespaceMetadata:
                  labels:
                    pod-security.kubernetes.io/enforce: restricted
                    pod-security.kubernetes.io/warn: restricted
