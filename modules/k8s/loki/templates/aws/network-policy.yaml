{{- if eq .Values.global.cloudProvider "aws" }}

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-gateway-alb
  namespace: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: gateway
  policyTypes:
    - Ingress
  ingress:
    - from:
        {{- range (splitList "," (printf "%s,%s,%s" (.Values.global.aws.publicSubnetCidrs | default "") (.Values.global.aws.privateSubnetCidrs | default "") (.Values.global.aws.controlSubnetCidrs | default ""))) }}
        {{- $cidr := trim . }}
        {{- if $cidr }}
        - ipBlock:
            cidr: {{ $cidr }}
        {{- end }}
        {{- end }}
      ports:
        - protocol: TCP
          port: http

{{- end }}