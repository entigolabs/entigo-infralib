# Patches Karpenter CRDs to remove stale conversion webhook config
# that blocks ArgoCD sync when upgrading from 1.0.x
# Runs in sync wave -1 so it executes before Karpenter chart resources
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-crd-patch
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-crd-patch
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
rules:
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    resourceNames:
      - "nodepools.karpenter.sh"
      - "nodeclaims.karpenter.sh"
      - "ec2nodeclasses.karpenter.k8s.aws"
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-crd-patch
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-crd-patch
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Release.Name }}-crd-patch
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-crd-patch
  namespace: {{ .Release.Namespace }}
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: {{ .Release.Name }}-crd-patch
      restartPolicy: Never
      containers:
        - name: patch
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              #!/bin/sh
              set -e
              CRDS="nodepools.karpenter.sh nodeclaims.karpenter.sh ec2nodeclasses.karpenter.k8s.aws"
              for crd in ${CRDS}; do
                echo "Patching ${crd}..."
                kubectl patch crd "${crd}" --type=json \
                  -p='[{"op":"remove","path":"/spec/conversion"}]' && \
                  echo "OK: ${crd}" || echo "SKIP: ${crd} (no conversion field or already removed)"
              done
              echo "Done."
