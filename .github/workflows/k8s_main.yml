name: Update modules/k8s

on:
  push:
    branches:
      - main
    paths:
      - 'modules/k8s/**'
  workflow_dispatch:
    inputs:
      module:
        description: 'Module path to test (e.g. modules/k8s/my-module)'
        required: true
        type: string

jobs:
  detect:
    name: Detect changed modules
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_modules: ${{ steps.set-matrix.outputs.has_modules }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: main
    - name: Get changed files
      if: github.event_name == 'push'
      id: changed-files
      uses: tj-actions/changed-files@v42
      with:
        base_sha: ${{ github.event.pull_request.base.sha }}
        sha: ${{ github.event.pull_request.head.sha }}
    - name: Build matrix
      id: set-matrix
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          # Use the manually provided module path
          MODULES='["${{ inputs.module }}"]'
        else
          # Extract unique module paths from changed/deleted files
          MODULES=$(for file in ${{ steps.changed-files.outputs.all_changed_files }} ${{ steps.changed-files.outputs.deleted_files }}; do
            echo "$file" | grep "modules/k8s" | cut -d'/' -f1-3
          done | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
        fi
        echo "Detected modules: $MODULES"
        if [ "$MODULES" == "[]" ] || [ -z "$MODULES" ]; then
          echo "has_modules=false" >> $GITHUB_OUTPUT
          echo "matrix={\"module\":[]}" >> $GITHUB_OUTPUT
        else
          echo "has_modules=true" >> $GITHUB_OUTPUT
          echo "matrix={\"module\":$MODULES}" >> $GITHUB_OUTPUT
        fi
  test:
    name: Test ${{ matrix.module }}
    needs: detect
    if: needs.detect.outputs.has_modules == 'true'
    runs-on: ubuntu-latest
    # Remove concurrency group — turnstyle handles queuing without cancelling pending runs
    strategy:
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
      max-parallel: 1
      fail-fast: false
    env:
      GOOGLE_PROJECT: ${{ secrets.GOOGLE_PROJECT }}
      GOOGLE_REGION: ${{ secrets.GOOGLE_REGION }}
      GOOGLE_ZONE: ${{ secrets.GOOGLE_ZONE }}
      GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      MAINTAINER_AWS_ACCESS_KEY_ID: ${{ secrets.MAINTAINER_AWS_ACCESS_KEY_ID }}
      MAINTAINER_AWS_SECRET_ACCESS_KEY: ${{ secrets.MAINTAINER_AWS_SECRET_ACCESS_KEY }}
      CONTRIBUTOR_AWS_ACCESS_KEY_ID: ${{ secrets.CONTRIBUTOR_AWS_ACCESS_KEY_ID }}
      CONTRIBUTOR_AWS_SECRET_ACCESS_KEY: ${{ secrets.CONTRIBUTOR_AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      PR_BRANCH: ${{ github.event.pull_request.head.ref }}
      ENTIGO_INFRALIB_DESTROY: true
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        ref: main
    - name: Wait for other workflow runs
      uses: softprops/turnstyle@v3
      with:
        # Abort if waiting longer than 30 minutes
        abort-after-seconds: 3600
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    - name: Run test
      run: |
        echo "Testing module: ${{ matrix.module }}"
        ${{ matrix.module }}/test.sh

  release:
    name: Release modules/k8s
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@v42
    
    - name: Get latest release
      id: get_latest_release
      uses: actions/github-script@v6
      with:
        script: |
          const latestStableRelease = await github.rest.repos.getLatestRelease({ owner: context.repo.owner, repo: context.repo.repo });
          const versionString = '' + latestStableRelease.data.tag_name;
          const regex = /^v(\d+)\.(\d+)\.(\d+)$/;
          const match = versionString.match(regex);
          const major = parseInt(match[1], 10);
          const minor = parseInt(match[2], 10);
          const patch = parseInt(match[3], 10) + 1;
          const new_version = `v${major}.${minor}.${patch}`
          core.setOutput('new_version',  new_version);
    - name: Authenticate with GitHub CLI
      run: gh auth login --with-token <<< ${{ secrets.GITHUB_TOKEN }}
      if: ${{ github.event_name == 'push' }}

    - name: Create Release
      id: create_release
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git tag -a modules/k8s-${{ steps.get_latest_release.outputs.new_version }}-rc${{ github.run_number }} -m "Release modules/k8s-${{ steps.get_latest_release.outputs.new_version }}-rc${{ github.run_number }}"
        git push origin modules/k8s-${{ steps.get_latest_release.outputs.new_version }}-rc${{ github.run_number }}
        CHANGED=""
        for module in $(for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            echo "$file" | grep "^modules/" | grep -ve"nuke" | cut -d'/' -f1-3
        done | sort -u )
        do
          CHANGED="$CHANGED 
          - $module"
        done

        RELEASE_URL=$(gh release create modules/k8s-${{ steps.get_latest_release.outputs.new_version }}-rc${{ github.run_number }} \
        --title "Release modules/k8s-${{ steps.get_latest_release.outputs.new_version }}-rc${{ github.run_number }}" \
        --generate-notes \
        --notes "## Changed modules, providers and images
        $CHANGED
        " \
        --draft=false \
        --latest=false \
        --prerelease=true)
        echo "RELEASE_URL=$RELEASE_URL" >> $GITHUB_ENV
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      if: ${{ github.event_name == 'push' }}
    - name: Slack Success Release Message
      if: ${{ success() && github.event_name == 'push' }}
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_COLOR: 'success'
        SLACK_MESSAGE: 'Released modules/k8s-${{ steps.get_latest_release.outputs.new_version }}-rc${{ github.run_number }} ${{ env.RELEASE_URL }}  ${{ steps.get_release_notes.outputs.notes }}'
        SLACK_USERNAME: ${{ secrets.SLACK_USERNAME }}
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_ICON_EMOJI: ${{ secrets.SLACK_ICON_EMOJI }}
        MSG_MINIMAL: actions url,commit
        SLACK_FOOTER: ""
    - name: Slack Failed Message
      if: ${{ failure() }}
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_COLOR: 'failure'
        SLACK_MESSAGE: 'Failed to update modules/k8s-${{ steps.get_latest_release.outputs.new_version }}-rc${{ github.run_number }} on main'
        SLACK_USERNAME: ${{ secrets.SLACK_USERNAME }}
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_ICON_EMOJI: ${{ secrets.SLACK_ICON_EMOJI }}
        SLACK_FOOTER: ""
