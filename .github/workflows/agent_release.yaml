name: Agent Release

on:
  workflow_run:
    workflows: ["Agent Stable"]
    types:
      - completed
  workflow_dispatch:

jobs:     
  install_main_aws:
    name: Install main AWS
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
    - name: Checkout code (tfmain)
      uses: actions/checkout@v4
      with:
        ref: main
    - name: Create resources based on latest release
      id: create_latest_release
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION:  ${{ secrets.AWS_REGION }}
        PR_BRANCH: "main"
      run: |
        ./release.sh tf
        
    - name: Slack Failed To Install Latest Release Message
      if: ${{ failure() }}
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_COLOR: 'failure'
        SLACK_MESSAGE: 'Updating from latest release to main failed for AWS.'
        SLACK_USERNAME: ${{ secrets.SLACK_USERNAME }}
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_ICON_EMOJI: ${{ secrets.SLACK_ICON_EMOJI }}
        SLACK_FOOTER: ""

  install_main_google:
    name: Install main Google
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
    - name: Checkout code (tfmain)
      uses: actions/checkout@v4
      with:
        ref: main
    - name: Create resources based on latest release
      id: create_latest_release
      env:
        GOOGLE_PROJECT: ${{ secrets.GOOGLE_PROJECT }}
        GOOGLE_REGION: ${{ secrets.GOOGLE_REGION }}
        GOOGLE_ZONE:  ${{ secrets.GOOGLE_ZONE }}
        GOOGLE_CREDENTIALS:  ${{ secrets.GOOGLE_CREDENTIALS }}
        PR_BRANCH: "main"
      run: |
        ./release.sh tf
    - name: Slack Failed To Install Latest Release Message
      if: ${{ failure() }}
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_COLOR: 'failure'
        SLACK_MESSAGE: 'Updating from latest release to main failed for Google.'
        SLACK_USERNAME: ${{ secrets.SLACK_USERNAME }}
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_ICON_EMOJI: ${{ secrets.SLACK_ICON_EMOJI }}
        SLACK_FOOTER: ""
  
    - name: Slack Failed To Install Latest Release Message
      if: ${{ failure() }}
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_COLOR: 'failure'
        SLACK_MESSAGE: 'Updating from latest release to main failed for K8S.'
        SLACK_USERNAME: ${{ secrets.SLACK_USERNAME }}
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_ICON_EMOJI: ${{ secrets.SLACK_ICON_EMOJI }}
        SLACK_FOOTER: ""
        
  release:   
    runs-on: ubuntu-latest
    needs: [install_main_aws,install_main_google]
    concurrency:
      group: pr-modules-test
      cancel-in-progress: false
    name: Release
    steps:
    - name: Free disk space
      run: |
        # Remove large preinstalled tools
        sudo rm -rf /usr/share/dotnet /opt/ghc /opt/hostedtoolcache/CodeQL /usr/local/lib/android
        sudo docker image prune --all --force
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: main
        fetch-depth: 0
    - name: Run k8s tests
      id: k8s_tests
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION:  ${{ secrets.AWS_REGION }}
        GOOGLE_PROJECT: ${{ secrets.GOOGLE_PROJECT }}
        GOOGLE_REGION: ${{ secrets.GOOGLE_REGION }}
        GOOGLE_ZONE:  ${{ secrets.GOOGLE_ZONE }}
        GOOGLE_CREDENTIALS:  ${{ secrets.GOOGLE_CREDENTIALS }}
        PR_BRANCH: "main"
      run: |
        df -h
        du -sh ../*
        ./release.sh k8s
    - name: Get latest release
      id: get_latest_release
      uses: actions/github-script@v6
      with:
        script: |
          const latestStableRelease = await github.rest.repos.getLatestRelease({ owner: context.repo.owner, repo: context.repo.repo });
          core.setOutput('stable_version',  latestStableRelease.data.tag_name);
          const currentMain =   await github.rest.repos.getBranch({ owner: context.repo.owner, repo: context.repo.repo, branch: "main" });
          const currentStable = await github.rest.repos.getCommit({ owner: context.repo.owner, repo: context.repo.repo, ref: 'refs/tags/' + latestStableRelease.data.tag_name });
          
          if (currentStable) {
            if (currentMain) {
              core.info('Latest main release commit: ' + currentStable.data.sha);
              core.info('Main branch commit: ' +  currentMain.data.commit.sha);
              if ( currentStable.data.sha != currentMain.data.commit.sha) {
                
                core.setOutput('new_release_needed', "true");
                const versionString = '' + latestStableRelease.data.tag_name;
                const regex = /^v(\d+)\.(\d+)\.(\d+)$/;
                const match = versionString.match(regex);
                const major = parseInt(match[1], 10);
                const minor = parseInt(match[2], 10);
                const patch = parseInt(match[3], 10) + 1;
                
                const fs = require('fs')
                const versionFile = fs.readFileSync('release_version.txt');
                const versionValue = versionFile.toString().trim();
                let new_version;
                if ( versionValue != `${major}.${minor}` ) {
                  core.info('File majour and minor version differ from latest release, initializing new release! ' + versionValue + ' vs ' + major + '.' + minor);
                  new_version = `v${versionValue}.0`
                } else {
                  new_version = `v${major}.${minor}.${patch}`
                }
                core.setOutput('new_version',  new_version);
                core.setOutput('oci_version', new_version.replace(/^v/, ''));  // bare semver for OCI
                core.info('Latest release is not the same as main branch, need to make a new release ' + new_version);
              } else {
                core.info('Latest release is same as main branch, no need to make a new release');
                core.setOutput('new_release_needed', "false");
              }
            } else {
               core.setFailed('No main branch found');
            }
          } else {
            core.setFailed('No main releases found');
          }
      
    - name: Authenticate with GitHub CLI
      run: gh auth login --with-token <<< ${{ secrets.GITHUB_TOKEN }}
      if: ${{ steps.get_latest_release.outputs.new_release_needed == 'true' }}
    
    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@v42
      if: ${{ steps.get_latest_release.outputs.new_release_needed == 'true' }}
      with:
        base_sha: refs/tags/${{ steps.get_latest_release.outputs.stable_version }}
        sha: ${{ github.ref }}
    - name: Install cosign
      uses: sigstore/cosign-installer@v3
      if: ${{ steps.get_latest_release.outputs.new_release_needed == 'true' }}

    - name: Install oras
      run: |
        ORAS_VERSION=1.3.2
        curl -sL https://github.com/oras-project/oras/releases/download/v${ORAS_VERSION}/oras_${ORAS_VERSION}_linux_amd64.tar.gz | tar -zx -C /usr/local/bin oras
      if: ${{ steps.get_latest_release.outputs.new_release_needed == 'true' }}

    - name: Create ECR Public repositories
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: us-east-1
      run: |
        # Fetch all existing repos once (--output text paginates automatically)
        existing=$(aws ecr-public describe-repositories \
          --query 'repositories[].repositoryName' --output text | tr '\t' '\n')

        # Build the list of repos we need from the filesystem
        needed=$(
          for chart_dir in modules/k8s/*/; do
            [ -f "${chart_dir}Chart.yaml" ] && \
              echo "entigo-infralib-release/k8s/$(basename "$chart_dir")"
          done
          for module_type in aws aws-v2 google; do
            for module_dir in modules/${module_type}/*/; do
              [ -f "${module_dir}main.tf" ] && \
                echo "entigo-infralib-release/${module_type}/$(basename "$module_dir")"
            done
          done
          echo "entigo-infralib-release/index"  # umbrella package repo
        )

        # Create only the ones not already present (set difference via comm)
        comm -23 <(echo "$needed" | sort -u) <(echo "$existing" | sort -u) | \
          while read -r repo; do
            [ -z "$repo" ] && continue
            echo "Creating ${repo}"
            aws ecr-public create-repository --repository-name "${repo}"
          done
      if: ${{ steps.get_latest_release.outputs.new_release_needed == 'true' }}

    - name: Create Release
      id: create_release
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git tag -a ${{ steps.get_latest_release.outputs.new_version }} -m "Release ${{ steps.get_latest_release.outputs.new_version }}"
        git push origin ${{ steps.get_latest_release.outputs.new_version }}
        
        echo "Changed modules, providers and images:"
        CHANGED=""
        for module in $(for file in ${{ steps.changed-files.outputs.all_changed_files }} ${{ steps.changed-files.outputs.deleted_files }}; do
            echo "$file" | grep "^modules/" | grep -ve"nuke" | cut -d'/' -f1-3
        done | sort -u )
        do
          CHANGED="$CHANGED 
          - $module"
        done
        for module in $(for file in ${{ steps.changed-files.outputs.all_changed_files }} ${{ steps.changed-files.outputs.deleted_files }}; do
            echo "$file" | grep -e "^images/\|^providers/" | cut -d'/' -f1-2
        done | sort -u )
        do
          CHANGED="$CHANGED 
          - $module"
        done
        
        RELEASE_URL=$(gh release create ${{ steps.get_latest_release.outputs.new_version }} \
        --title "Release ${{ steps.get_latest_release.outputs.new_version }}" \
        --generate-notes \
        --notes "## Changed modules, providers and images
        $CHANGED
        " \
        --draft=false \
        --latest=true \
        --prerelease=false)
        echo "RELEASE_URL=$RELEASE_URL" >> $GITHUB_ENV
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      if: ${{ steps.get_latest_release.outputs.new_release_needed == 'true' }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      if: ${{ steps.get_latest_release.outputs.new_release_needed == 'true' }}
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}
      if: ${{ steps.get_latest_release.outputs.new_release_needed == 'true' }}
    - name: Tag correct version
      env:
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        aws-region: us-east-1
      run: |
        echo $DOCKER_PASSWORD | docker login -u $DOCKER_USERNAME --password-stdin && 
        aws ecr-public get-login-password --region us-east-1 | docker login -u AWS --password-stdin public.ecr.aws/entigolabs &&
        docker buildx imagetools create -t public.ecr.aws/entigolabs/entigo-infralib-base:${{ steps.get_latest_release.outputs.new_version }} -t entigolabs/entigo-infralib-base:${{ steps.get_latest_release.outputs.new_version }} public.ecr.aws/entigolabs/entigo-infralib-base:latest &&
        docker buildx imagetools create -t public.ecr.aws/entigolabs/entigo-infralib-kubectl:${{ steps.get_latest_release.outputs.new_version }} -t entigolabs/entigo-infralib-kubectl:${{ steps.get_latest_release.outputs.new_version }} public.ecr.aws/entigolabs/entigo-infralib-kubectl:latest &&
        docker buildx imagetools create -t public.ecr.aws/entigolabs/entigo-infralib-aws:${{ steps.get_latest_release.outputs.new_version }} -t entigolabs/entigo-infralib-aws:${{ steps.get_latest_release.outputs.new_version }} public.ecr.aws/entigolabs/entigo-infralib-aws:latest &&
        docker buildx imagetools create -t public.ecr.aws/entigolabs/entigo-infralib-google:${{ steps.get_latest_release.outputs.new_version }} -t entigolabs/entigo-infralib-google:${{ steps.get_latest_release.outputs.new_version }} public.ecr.aws/entigolabs/entigo-infralib-google:latest
        docker buildx imagetools create -t public.ecr.aws/entigolabs/entigo-infralib-test:${{ steps.get_latest_release.outputs.new_version }} -t entigolabs/entigo-infralib-test:${{ steps.get_latest_release.outputs.new_version }} public.ecr.aws/entigolabs/entigo-infralib-test:latest
      if: ${{ steps.get_latest_release.outputs.new_release_needed == 'true' }}

    - name: Set up SSH key
      run: |
        mkdir ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan github.com >> ~/.ssh/known_hosts
      if: ${{ steps.get_latest_release.outputs.new_release_needed == 'true' }}
    - name: Get release notes
      id: get_release_notes
      uses: actions/github-script@v6
      with:
        script: |
          const latestRelease = await github.rest.repos.getLatestRelease({ owner: context.repo.owner, repo: context.repo.repo });
          core.setOutput('notes',  latestRelease.data.body);
      if: ${{ steps.get_latest_release.outputs.new_release_needed == 'true' }}
      
    - name: Publish Helm charts as OCI
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: us-east-1
        RELEASE_VERSION: ${{ steps.get_latest_release.outputs.oci_version }}
      run: |
        set -o pipefail
        echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
        echo ${{ secrets.GITHUB_TOKEN }} | oras login ghcr.io -u ${{ github.actor }} --password-stdin
        aws ecr-public get-login-password --region us-east-1 | helm registry login public.ecr.aws -u AWS --password-stdin
        aws ecr-public get-login-password --region us-east-1 | oras login public.ecr.aws -u AWS --password-stdin

        mkdir -p /tmp/agent-manifest

        # Per-chart worker; runs in parallel via xargs. Each worker writes its own
        # manifest fragment to avoid concurrent-append corruption on a shared file.
        publish_chart() {
          set -euo pipefail
          chart_dir="$1"
          chart_name=$(basename "$chart_dir")
          if [ ! -f "${chart_dir}Chart.yaml" ]; then return 0; fi
          echo "Publishing k8s/${chart_name}"

          # Generate SBOM first, while the test folder still exists.
          # sbom.py picks up test/static_values.yaml itself if present.
          python3 common/sbom.py helm "${chart_dir}" "${chart_name}" "${RELEASE_VERSION}" > /tmp/${chart_name}-sbom.spdx.json

          # Now drop the test folder and package the chart
          rm -rf "${chart_dir}test" "${chart_dir}test.sh"
          helm package "$chart_dir" --version ${RELEASE_VERSION} --destination /tmp/helm-charts

          # Push to ghcr only; capture digest from helm push output
          GHCR_DIGEST=$(helm push /tmp/helm-charts/${chart_name}-${RELEASE_VERSION}.tgz \
            oci://ghcr.io/entigolabs/entigo-infralib-release/k8s 2>&1 \
            | awk '/Digest:/ {print $2}')
          if [ -z "${GHCR_DIGEST}" ]; then echo "ERROR: failed to capture digest for ${chart_name}"; return 1; fi

          # Attach the SBOM on ghcr, capture its digest
          GHCR_SBOM_DIGEST=$(oras attach \
            --artifact-type application/vnd.syft.sbom \
            --disable-path-validation \
            --format go-template --template "{{.digest}}" \
            ghcr.io/entigolabs/entigo-infralib-release/k8s/${chart_name}:${RELEASE_VERSION} \
            /tmp/${chart_name}-sbom.spdx.json:application/spdx+json)
          if [ -z "${GHCR_SBOM_DIGEST}" ]; then echo "ERROR: failed to attach SBOM for ${chart_name}"; return 1; fi

          # Mirror subject + SBOM to ecr (byte-identical digests)
          oras cp -r --no-tty \
            ghcr.io/entigolabs/entigo-infralib-release/k8s/${chart_name}:${RELEASE_VERSION} \
            public.ecr.aws/entigolabs/entigo-infralib-release/k8s/${chart_name}:${RELEASE_VERSION} >/dev/null

          # cp -r gives identical digests, so reuse them for ecr
          ECR_DIGEST="${GHCR_DIGEST}"
          ECR_SBOM_DIGEST="${GHCR_SBOM_DIGEST}"

          # Record digests in a per-chart fragment (merged after the parallel run)
          jq -nc \
            --arg name "${chart_name}" \
            --arg type "k8s" \
            --arg tag "${RELEASE_VERSION}" \
            --arg ghcr_repo "ghcr.io/entigolabs/entigo-infralib-release/k8s/${chart_name}" \
            --arg ghcr_pkg "${GHCR_DIGEST}" \
            --arg ghcr_sbom "${GHCR_SBOM_DIGEST}" \
            --arg ecr_repo "public.ecr.aws/entigolabs/entigo-infralib-release/k8s/${chart_name}" \
            --arg ecr_pkg "${ECR_DIGEST}" \
            --arg ecr_sbom "${ECR_SBOM_DIGEST}" \
            '{
              name: $name, type: $type, tag: $tag,
              registries: {
                ghcr: { repository: $ghcr_repo, package: $ghcr_pkg, sbom: $ghcr_sbom },
                ecr:  { repository: $ecr_repo,  package: $ecr_pkg,  sbom: $ecr_sbom }
              }
            }' > /tmp/agent-manifest/entry-k8s-${chart_name}.json
          echo "Published  k8s/${chart_name} (${GHCR_DIGEST})"
        }
        export -f publish_chart
        export RELEASE_VERSION

        # Run up to 6 charts in parallel; -I{} passes each dir, fail if any worker fails
        printf '%s\n' modules/k8s/*/ \
          | xargs -P 6 -I{} bash -c 'publish_chart "$@"' _ {}

        # Merge per-chart fragments into the shared JSONL the index step consumes
        cat /tmp/agent-manifest/entry-k8s-*.json 2>/dev/null >> /tmp/agent-manifest/entries.jsonl
      if: ${{ steps.get_latest_release.outputs.new_release_needed == 'true' }}

    - name: Publish OpenTofu modules as OCI
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: us-east-1
        RELEASE_VERSION: ${{ steps.get_latest_release.outputs.oci_version }}
      run: |
        set -o pipefail
        echo ${{ secrets.GITHUB_TOKEN }} | oras login ghcr.io -u ${{ github.actor }} --password-stdin
        aws ecr-public get-login-password --region us-east-1 | oras login public.ecr.aws -u AWS --password-stdin

        mkdir -p /tmp/agent-manifest

        # Per-module worker; arg is the full path "modules/<type>/<name>/".
        # No cd (parallel workers can't share a cwd) — use repo-root-relative paths.
        publish_module() {
          set -euo pipefail
          module_path="$1"                              # e.g. modules/aws/vpc/
          module_type=$(basename "$(dirname "$module_path")")
          module_name=$(basename "$module_path")
          if [ ! -f "${module_path}main.tf" ]; then return 0; fi
          echo "Publishing ${module_type}/${module_name}"

          rm -rf "${module_path}test" "${module_path}test.sh"
          zip_file="/tmp/${module_type}-${module_name}-${RELEASE_VERSION}.zip"
          # zip from inside modules/<type> so archive paths stay "<name>/..."
          ( cd "modules/${module_type}" && zip -r "${zip_file}" "${module_name}/" >/dev/null )

          # Push to ghcr only; capture digest from push output
          GHCR_DIGEST=$(oras push \
            --artifact-type=application/vnd.opentofu.modulepkg \
            --disable-path-validation \
            --format go-template --template "{{.digest}}" \
            ghcr.io/entigolabs/entigo-infralib-release/${module_type}/${module_name}:${RELEASE_VERSION} \
            "${zip_file}:archive/zip")
          if [ -z "${GHCR_DIGEST}" ]; then echo "ERROR: failed to capture digest for ${module_type}/${module_name}"; return 1; fi

          # Create and attach SBOM on ghcr, capture its digest
          sbom_file="/tmp/${module_type}-${module_name}-sbom.spdx.json"
          python3 common/sbom.py tofu "${module_path}" "${module_name}" "${RELEASE_VERSION}" "${module_type}" > "${sbom_file}"
          GHCR_SBOM_DIGEST=$(oras attach \
            --artifact-type application/vnd.syft.sbom \
            --disable-path-validation \
            --format go-template --template "{{.digest}}" \
            ghcr.io/entigolabs/entigo-infralib-release/${module_type}/${module_name}:${RELEASE_VERSION} \
            "${sbom_file}:application/spdx+json")
          if [ -z "${GHCR_SBOM_DIGEST}" ]; then echo "ERROR: failed to attach SBOM for ${module_type}/${module_name}"; return 1; fi

          # Mirror subject + SBOM to ecr (byte-identical digests)
          oras cp -r --no-tty \
            ghcr.io/entigolabs/entigo-infralib-release/${module_type}/${module_name}:${RELEASE_VERSION} \
            public.ecr.aws/entigolabs/entigo-infralib-release/${module_type}/${module_name}:${RELEASE_VERSION} >/dev/null

          ECR_DIGEST="${GHCR_DIGEST}"
          ECR_SBOM_DIGEST="${GHCR_SBOM_DIGEST}"

          # Record digests in a per-module fragment (merged after the parallel run)
          jq -nc \
            --arg name "${module_name}" \
            --arg type "${module_type}" \
            --arg tag "${RELEASE_VERSION}" \
            --arg ghcr_repo "ghcr.io/entigolabs/entigo-infralib-release/${module_type}/${module_name}" \
            --arg ghcr_pkg "${GHCR_DIGEST}" \
            --arg ghcr_sbom "${GHCR_SBOM_DIGEST}" \
            --arg ecr_repo "public.ecr.aws/entigolabs/entigo-infralib-release/${module_type}/${module_name}" \
            --arg ecr_pkg "${ECR_DIGEST}" \
            --arg ecr_sbom "${ECR_SBOM_DIGEST}" \
            '{
              name: $name, type: $type, tag: $tag,
              registries: {
                ghcr: { repository: $ghcr_repo, package: $ghcr_pkg, sbom: $ghcr_sbom },
                ecr:  { repository: $ecr_repo,  package: $ecr_pkg,  sbom: $ecr_sbom }
              }
            }' > /tmp/agent-manifest/entry__${module_type}__${module_name}.json
          echo "Published  ${module_type}/${module_name} (${GHCR_DIGEST})"
        }
        export -f publish_module
        export RELEASE_VERSION

        # Run up to 6 modules in parallel across all module types
        printf '%s\n' modules/aws/*/ modules/aws-v2/*/ modules/google/*/ \
          | xargs -P 6 -I{} bash -c 'publish_module "$@"' _ {}

        # Merge per-module fragments into the shared JSONL the index step consumes.
        # Single glob — type names like aws / aws-v2 can't prefix-collide thanks to __.
        cat /tmp/agent-manifest/entry__*.json 2>/dev/null >> /tmp/agent-manifest/entries.jsonl
      if: ${{ steps.get_latest_release.outputs.new_release_needed == 'true' }}

    - name: Publish package index as OCI
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_DEFAULT_REGION: us-east-1
        RELEASE_VERSION: ${{ steps.get_latest_release.outputs.oci_version }}
      run: |
        set -o pipefail
        echo ${{ secrets.GITHUB_TOKEN }} | oras login ghcr.io -u ${{ github.actor }} --password-stdin
        aws ecr-public get-login-password | oras login public.ecr.aws -u AWS --password-stdin

        STAGE=$(mktemp -d)

        # Stage the full modules + providers tree, excluding only charts/, test/, test.sh.
        # (Helm subchart archives in charts/ are large and not needed in the index;
        #  test folders/scripts are not part of the released content.)
        rsync -a \
          --exclude 'charts/' \
          --exclude 'test/' \
          --exclude 'test.sh' \
          --exclude 'README.md' \
          modules providers "${STAGE}/"

        # ---- Verify completeness and ECR presence before building the index ----
        # Stage 1: expected count (filesystem) must equal recorded entries.
        expected=$(
          for d in modules/k8s/*/; do [ -f "${d}Chart.yaml" ] && echo x; done
          for d in modules/aws/*/ modules/aws-v2/*/ modules/google/*/; do [ -f "${d}main.tf" ] && echo x; done
        )
        expected_count=$(echo "${expected}" | grep -c x || true)
        recorded_count=$(wc -l < /tmp/agent-manifest/entries.jsonl | tr -d ' ')
        echo "Expected ${expected_count} artifacts, recorded ${recorded_count}"
        if [ "${expected_count}" -ne "${recorded_count}" ]; then
          echo "ERROR: artifact count mismatch — some package(s) failed to publish"
          exit 1
        fi

        # Stage 2: every recorded tag must resolve in ECR to the recorded digest.
        # One `oras resolve` per entry confirms both tag existence and digest match.
        fail=0
        while read -r entry; do
          ecr_repo=$(echo "${entry}" | jq -r '.registries.ecr.repository')
          ecr_pkg=$(echo "${entry}" | jq -r '.registries.ecr.package')
          tag=$(echo "${entry}" | jq -r '.tag')
          # Capture stderr too — if resolve errors, show why instead of masking as <missing>
          resolve_out=$(oras resolve "${ecr_repo}:${tag}" 2>&1) || true
          # oras resolve prints the bare digest on success
          tag_digest=$(echo "${resolve_out}" | grep -oE 'sha256:[0-9a-f]{64}' | head -n1)
          if [ "${tag_digest}" != "${ecr_pkg}" ]; then
            echo "ERROR: ${ecr_repo}:${tag} -> '${tag_digest:-<missing>}', expected '${ecr_pkg}'"
            echo "       oras output: ${resolve_out}"
            fail=1
          fi
        done < /tmp/agent-manifest/entries.jsonl
        if [ "${fail}" -ne 0 ]; then
          echo "ERROR: ECR verification failed for one or more artifacts"
          exit 1
        fi
        echo "Verified ${recorded_count} artifacts present in ECR"
        # ------------------------------------------------------------------------

        # Build human/agent-friendly manifest.json from collected digests
        jq -s \
          --arg version "${RELEASE_VERSION}" \
          '{version: $version, modules: .}' \
          /tmp/agent-manifest/entries.jsonl \
          > "${STAGE}/manifest.json"

        # Build SPDX SBOM referencing each module package as an oci purl
        python3 common/sbom.py agent \
          /tmp/agent-manifest/entries.jsonl \
          "${RELEASE_VERSION}" \
          > "${STAGE}/index-sbom.spdx.json"

        # Package and push from inside the staging dir so oras gets relative paths
        cd "${STAGE}"
        zip -r index-${RELEASE_VERSION}.zip modules providers manifest.json index-sbom.spdx.json

        # Push to ghcr only; ecr gets a byte-identical copy below.
        # Capture the digest directly from the push output.
        GHCR_DIGEST=$(oras push \
          --artifact-type=application/vnd.entigo.agentpkg \
          --format go-template --template "{{.digest}}" \
          ghcr.io/entigolabs/entigo-infralib-release/index:${RELEASE_VERSION} \
          index-${RELEASE_VERSION}.zip:archive/zip)
        [ -z "${GHCR_DIGEST}" ] && { echo "ERROR: failed to capture index digest"; exit 1; }

        # Sign the index on ghcr
        cosign sign --yes ghcr.io/entigolabs/entigo-infralib-release/index@${GHCR_DIGEST}

        # Attach the umbrella SBOM as a referrer on ghcr
        GHCR_SBOM_DIGEST=$(oras attach \
          --artifact-type application/vnd.syft.sbom \
          --format go-template --template "{{.digest}}" \
          ghcr.io/entigolabs/entigo-infralib-release/index:${RELEASE_VERSION} \
          index-sbom.spdx.json:application/spdx+json)
        cosign sign --yes ghcr.io/entigolabs/entigo-infralib-release/index@${GHCR_SBOM_DIGEST}

        # Mirror subject + SBOM to ecr (byte-identical digests)
        oras cp -r --no-tty \
          ghcr.io/entigolabs/entigo-infralib-release/index:${RELEASE_VERSION} \
          public.ecr.aws/entigolabs/entigo-infralib-release/index:${RELEASE_VERSION} >/dev/null

        # Copy the cosign signatures (.sig tags) from ghcr to ecr instead of re-signing
        REPO_GHCR="ghcr.io/entigolabs/entigo-infralib-release/index"
        REPO_ECR="public.ecr.aws/entigolabs/entigo-infralib-release/index"
        oras cp ${REPO_GHCR}:sha256-${GHCR_DIGEST#sha256:}.sig      ${REPO_ECR}:sha256-${GHCR_DIGEST#sha256:}.sig
        oras cp ${REPO_GHCR}:sha256-${GHCR_SBOM_DIGEST#sha256:}.sig ${REPO_ECR}:sha256-${GHCR_SBOM_DIGEST#sha256:}.sig

        # ---- Consumer instructions ----------------------------------------------
        IDENTITY_RE='^https://github\.com/entigolabs/entigo-infralib/\.github/workflows/.*@refs/.*$'
        printf '%s\n' \
          "" \
          "============================================================" \
          "Package index published: ${RELEASE_VERSION}" \
          "============================================================" \
          "" \
          "Pull and extract the index (either registry; digests are identical):" \
          "" \
          "  oras pull ghcr.io/entigolabs/entigo-infralib-release/index:${RELEASE_VERSION} -o index-out" \
          "  # or:" \
          "  oras pull public.ecr.aws/entigolabs/entigo-infralib-release/index:${RELEASE_VERSION} -o index-out" \
          "" \
          "  unzip index-out/index-${RELEASE_VERSION}.zip -d index-${RELEASE_VERSION}" \
          "  cat index-${RELEASE_VERSION}/manifest.json   # catalog of all packages + digests" \
          "" \
          "Verify the index signature with cosign (pinned to this repo's workflow identity):" \
          "" \
          "  cosign verify \\" \
          "    --certificate-oidc-issuer https://token.actions.githubusercontent.com \\" \
          "    --certificate-identity-regexp '${IDENTITY_RE}' \\" \
          "    ghcr.io/entigolabs/entigo-infralib-release/index@${GHCR_DIGEST}" \
          "" \
          "The index digest above commits to manifest.json, which lists every package" \
          "digest. Pull individual packages BY DIGEST (not tag) to inherit that trust:" \
          "" \
          "  oras pull <repository>@<package-digest-from-manifest.json>" \
          "============================================================" \
          ""
        # -------------------------------------------------------------------------
      if: ${{ steps.get_latest_release.outputs.new_release_needed == 'true' }}

    - name: Clone the target repository and copy files
      run: |
        git clone git@github.com:entigolabs/entigo-infralib-release.git entigo-infralib-release
        rsync --delete -av --exclude '*/test' --exclude '*/test.sh' --exclude '*/go.mod' --exclude '*/go.sum' --exclude 'modules/aws/aws-nuke-config.yml' --exclude 'modules/aws/nuke.sh' --exclude 'modules/google/nuke.sh' modules entigo-infralib-release/
        rsync --delete -av --exclude '*/test' --exclude '*/test.sh' providers entigo-infralib-release/
        rsync --delete -av --exclude '*/test' --exclude '*/test.sh' images entigo-infralib-release/
        cd entigo-infralib-release
        git config user.name "GitHub Actions" && git config user.email "actions@github.com" && git add --all && git commit -a -m"Release ${{ steps.get_latest_release.outputs.new_version }}" -m "${{ steps.get_release_notes.outputs.notes }}" && git push && git tag -a ${{ steps.get_latest_release.outputs.new_version }} -m "Release ${{ steps.get_latest_release.outputs.new_version }}" -m "${{ steps.get_release_notes.outputs.notes }}" && git push origin ${{ steps.get_latest_release.outputs.new_version }} || echo "Nothing to release"
      if: ${{ steps.get_latest_release.outputs.new_release_needed == 'true' }}

    - name: Slack Success Release Message
      if: ${{ success() && steps.get_latest_release.outputs.new_release_needed == 'true' }}
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_COLOR: 'success'
        SLACK_MESSAGE: 'Released ${{ steps.get_latest_release.outputs.new_version }} ${{ env.RELEASE_URL }} ${{ steps.get_release_notes.outputs.notes }}'
        SLACK_USERNAME: ${{ secrets.SLACK_USERNAME }}
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_ICON_EMOJI: ${{ secrets.SLACK_ICON_EMOJI }}
        MSG_MINIMAL: actions url,commit
        SLACK_FOOTER: ""
    - name: Slack Failed To Release Message
      if: ${{ failure() }}
      uses: rtCamp/action-slack-notify@v2
      env:
        SLACK_COLOR: 'failure'
        SLACK_MESSAGE: 'Releasing of new version failed.'
        SLACK_USERNAME: ${{ secrets.SLACK_USERNAME }}
        SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_ICON_EMOJI: ${{ secrets.SLACK_ICON_EMOJI }}
        SLACK_FOOTER: ""
